<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 4 · Bienvenida Neon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            transition: background 0.5s;
            position: relative;
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .message-card {
            background: rgba(10, 18, 28, 0.75);
            backdrop-filter: blur(16px);
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px #00ffff88, 0 0 60px #00ffff44;
            border-radius: 64px;
            padding: 3rem 3.5rem;
            max-width: 700px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 20;
            animation: glowPulse 3s infinite alternate;
        }
        .greeting {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(145deg, #fff, #aaffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px cyan;
            word-break: break-word;
        }
        .sub {
            color: #c0e0ff;
            margin-top: 1rem;
            font-size: 1.2rem;
            opacity: 0.9;
        }
        @keyframes glowPulse {
            0% { border-color: #00ffff; box-shadow: 0 0 30px #00ffff88; }
            100% { border-color: #ff66ff; box-shadow: 0 0 50px #ff66ffaa; }
        }
        button {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            margin-top: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px white;
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="app"></div>

    <script>
        'use strict';
        (function() {
            // ---------- CANVAS CONFETTI (profesional) ----------
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const maxParticles = 200;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Confetti {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height - height;
                    this.size = Math.random() * 8 + 4;
                    this.speed = Math.random() * 3 + 2;
                    this.angle = Math.random() * 2 * Math.PI;
                    this.spin = Math.random() * 0.2 - 0.1;
                    this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
                }
                update() {
                    this.y += this.speed;
                    this.angle += this.spin;
                    if (this.y > height) {
                        this.y = -this.size;
                        this.x = Math.random() * width;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.restore();
                }
            }

            function initConfetti() {
                for (let i = 0; i < maxParticles; i++) {
                    particles.push(new Confetti());
                }
            }
            initConfetti();

            function animateConfetti() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateConfetti);
            }
            animateConfetti();

            // ---------- INTERACCIÓN DE BIENVENIDA ----------
            const app = document.getElementById('app');

            function mostrarBienvenida(nombre) {
                const card = document.createElement('div');
                card.className = 'message-card';
                card.innerHTML = `
                    <div class="greeting">🎉 Bienvenido, ${nombre} 🎉</div>
                    <div class="sub">Disfruta la experiencia</div>
                    <button onclick="location.reload()">✖ Cerrar</button>
                `;
                app.innerHTML = '';
                app.appendChild(card);
            }

            function iniciar() {
                let nombre = prompt("¿Cómo te llamas?");
                nombre = nombre?.trim();
                if (nombre) {
                    mostrarBienvenida(nombre);
                } else {
                    const card = document.createElement('div');
                    card.className = 'message-card';
                    card.innerHTML = `
                        <div class="greeting">😕 No está registrado</div>
                        <div style="margin-top:1rem;">¡Intenta de nuevo!</div>
                        <button onclick="location.reload()">↻ Reintentar</button>
                    `;
                    app.appendChild(card);
                }
            }
            window.onload = iniciar;
        })();
    </script>
</body>
</html>
