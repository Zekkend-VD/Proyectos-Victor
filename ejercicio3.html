<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 · Dispositivos Neon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;700&display=swap');
        :root {
            --bg: #0b1015;
            --card-bg: #111a22;
            --neon-blue: #00a6ff;
            --neon-orange: #ff9900;
            --glow-blue: 0 0 12px #00a6ffaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0c1118, #05080c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--neon-blue);
            box-shadow: var(--glow-blue), 0 25px 40px #000;
            border-radius: 44px;
            padding: 2.5rem 2.5rem;
            max-width: 650px;
            width: 100%;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--neon-orange); box-shadow: 0 0 25px #ff9900aa; }
        h2 {
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 10px var(--neon-blue);
            border-left: 8px solid var(--neon-orange);
            padding-left: 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }
        li {
            background: #16212b;
            padding: 1.1rem 1.8rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #e5f0ff;
            border: 1px solid #2e4c5c;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: inset 0 0 8px #00000050;
        }
        li::before {
            content: "⚡";
            color: var(--neon-orange);
            font-size: 1.3rem;
            text-shadow: 0 0 8px var(--neon-orange);
        }
        li:hover {
            background: #1f323f;
            border-color: var(--neon-blue);
            transform: translateX(12px);
            box-shadow: 0 0 18px var(--neon-blue);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>💻 DISPOSITIVOS</h2>
        <ul id="device-list"></ul>
    </div>
    <script>
        'use strict';
        const dispositivos = [
            "Cornetas Digital",
            "Monitor",
            "Impresora",
            "Ploter",
            "Video Bimb",
            "Impresora 3D",
            "Router Neon",
            "Drone XR"
        ];
        const ul = document.getElementById('device-list');
        ul.innerHTML = dispositivos.map(item => `<li>${item}</li>`).join('');
    </script>
</body>
</html>
