<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 · IVA Neon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;700;800&display=swap');
        :root {
            --bg: #0a0c10;
            --surface: #11161c;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff44b0;
            --neon-green: #a6ff6f;
            --glow-cyan: 0 0 10px #00f0ff88, 0 0 20px #00f0ff44;
            --glow-magenta: 0 0 10px #ff44b088, 0 0 20px #ff44b044;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 70% 20%, #0f131a, #06080b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan), 0 20px 40px #00000080;
            border-radius: 48px;
            padding: 2.5rem 2.2rem;
            max-width: 550px;
            width: 100%;
            transition: 0.3s;
            animation: fadeIn 0.6s;
        }
        .card:hover { box-shadow: var(--glow-cyan), 0 30px 60px #000; }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
            text-shadow: 0 0 8px var(--neon-cyan);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            color: #ccddee;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .field input {
            background: #1e2630;
            border: 2px solid #2f3a46;
            border-radius: 60px;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        .field input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .result {
            background: #0f151e;
            border-radius: 60px;
            padding: 1.6rem 2rem;
            border-left: 8px solid var(--neon-magenta);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 0 10px #00000060;
        }
        .result span {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--neon-magenta);
            text-shadow: 0 0 10px var(--neon-magenta);
        }
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧾 PRECIO + IVA</h1>
        <div class="input-group">
            <div class="field">
                <label>💵 Precio sin IVA</label>
                <input type="number" id="precio" value="350" step="0.01" min="0">
            </div>
            <div class="field">
                <label>📈 IVA (%)</label>
                <input type="number" id="iva" value="16" step="0.1" min="0">
            </div>
        </div>
        <div class="result">
            <span style="color:#b0d0ff;">TOTAL</span>
            <span id="total">406.00</span>
        </div>
    </div>
    <script>
        'use strict';
        const precioInput = document.getElementById('precio');
        const ivaInput = document.getElementById('iva');
        const totalSpan = document.getElementById('total');

        const calcularTotal = () => {
            const precio = parseFloat(precioInput.value) || 0;
            const iva = parseFloat(ivaInput.value) || 0;
            const total = precio + (precio * iva) / 100;
            totalSpan.textContent = total.toFixed(2);
        };

        precioInput.addEventListener('input', calcularTotal);
        ivaInput.addEventListener('input', calcularTotal);
        calcularTotal(); // inicial
    </script>
</body>
</html>
