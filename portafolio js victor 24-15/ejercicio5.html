<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 5 · Bucles Neon + Explicaciones</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;700;800&display=swap');
        :root {
            --bg: #0b0f17;
            --surface: #151f2e;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff44b0;
            --neon-yellow: #ffe600;
            --glow-cyan: 0 0 15px #00ffffaa, 0 0 30px #00ffff66;
            --glow-magenta: 0 0 15px #ff44b0aa, 0 0 30px #ff44b066;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 40%, #1a1e2c, #0a0c14);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .loop-lab {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--glow-cyan), 0 20px 40px #00000080;
            border-radius: 48px;
            padding: 2.5rem;
            max-width: 1000px;
            width: 100%;
            transition: 0.3s;
        }
        .loop-lab:hover { border-color: var(--neon-magenta); box-shadow: var(--glow-magenta); }
        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(145deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px var(--neon-cyan);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .tabs {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .tab {
            background: #1e2c3a;
            color: #c0e0ff;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            border: 1px solid #3f6a8a;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: var(--neon-cyan);
            color: #000;
            border-color: white;
            box-shadow: var(--glow-cyan);
        }
        .explain-box {
            background: #0e1a26;
            border-left: 8px solid var(--neon-yellow);
            border-radius: 24px;
            padding: 1.2rem 2rem;
            margin-bottom: 1.8rem;
            color: #d0f0ff;
            font-size: 1rem;
            line-height: 1.6;
            box-shadow: inset 0 0 15px #00000060;
        }
        .code-snippet {
            background: #0a121c;
            padding: 1rem 1.8rem;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            color: #aaffdd;
            border: 1px solid var(--neon-cyan);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .controls {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: white;
        }
        input[type=range] {
            width: 200px;
            height: 8px;
            background: #2a4050;
            border-radius: 10px;
            appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 22px;
            height: 22px;
            background: var(--neon-yellow);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-yellow);
            border: 2px solid white;
            cursor: pointer;
        }
        .output-console {
            background: #0d1720;
            border-radius: 32px;
            padding: 1.8rem;
            border: 1px solid #3e6a8a;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            min-height: 180px;
            transition: 0.2s;
        }
        .badge {
            background: #1f3140;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #e0f0ff;
            border-left: 6px solid var(--neon-magenta);
            box-shadow: inset 0 0 8px black;
            transition: 0.2s;
        }
        .badge.highlight {
            background: #332a4a;
            border-left-color: var(--neon-yellow);
            color: #ffe88c;
            box-shadow: 0 0 15px var(--neon-yellow);
        }
        .btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: var(--glow-cyan);
        }
        @keyframes fadeIn { 0% { opacity:0; transform:translateY(10px); } 100% { opacity:1; } }
    </style>
</head>
<body>
    <div class="loop-lab">
        <h1>🌀 BUCLES · EXPLICACIÓN INTERACTIVA</h1>
        <div class="tabs">
            <div class="tab active" data-tab="for">for</div>
            <div class="tab" data-tab="while">while</div>
            <div class="tab" data-tab="break">break / continue</div>
        </div>
        <!-- Explicación dinámica (se actualiza con JS) -->
        <div id="explanation" class="explain-box">
            Selecciona un bucle para ver su explicación.
        </div>
        <div id="codeExample" class="code-snippet">
            // Código de ejemplo
        </div>
        <div class="controls">
            <div class="slider-container">
                <span style="color:var(--neon-yellow);">⏲️ Iteraciones:</span>
                <input type="range" id="iterSlider" min="1" max="20" value="10">
                <span id="iterValue" style="color:white; font-weight:700;">10</span>
            </div>
            <button id="runLoop" class="btn">▶ EJECUTAR BUCLE</button>
        </div>
        <div id="loopOutput" class="output-console">
            <!-- Resultados -->
        </div>
    </div>

    <script>
        'use strict';
        const tabs = document.querySelectorAll('.tab');
        const explainBox = document.getElementById('explanation');
        const codeExample = document.getElementById('codeExample');
        const iterSlider = document.getElementById('iterSlider');
        const iterValue = document.getElementById('iterValue');
        const runBtn = document.getElementById('runLoop');
        const output = document.getElementById('loopOutput');

        // Explicaciones detalladas
        const explanations = {
            for: {
                text: '🔹 El bucle <strong>for</strong> repite un bloque mientras una condición sea verdadera. Es ideal cuando se conoce el número de iteraciones.',
                code: 'for (let i = 0; i < N; i++) { // bloque }'
            },
            while: {
                text: '🔹 El bucle <strong>while</strong> evalúa la condición antes de cada iteración. Se usa cuando no se sabe exactamente cuántas repeticiones serán necesarias.',
                code: 'let i = 0;\nwhile (i < N) { // bloque; i++ }'
            },
            break: {
                text: '🔹 <strong>break</strong> sale del bucle inmediatamente. <strong>continue</strong> salta a la siguiente iteración. Muy útil para omitir valores o salir bajo una condición.',
                code: 'for (let i = 0; i < 10; i++) {\n  if (i === 5) continue;\n  if (i === 8) break;\n  // i ≠5 y i<8\n}'
            }
        };

        let currentTab = 'for';

        function setActiveTab(tabId) {
            tabs.forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            currentTab = tabId;
            explainBox.innerHTML = explanations[tabId].text;
            codeExample.innerHTML = explanations[tabId].code;
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                setActiveTab(tab.dataset.tab);
                renderLoop(); // renderizar con nuevo tab
            });
        });

        // Slider
        iterSlider.addEventListener('input', () => {
            iterValue.textContent = iterSlider.value;
        });

        function renderLoop() {
            const max = parseInt(iterSlider.value, 10);
            let html = '';

            if (currentTab === 'for') {
                for (let i = 0; i < max; i++) {
                    html += `<span class="badge">for: ${i}</span>`;
                }
                html += `<span class="badge highlight">✅ for ejecutado ${max} veces</span>`;
            } else if (currentTab === 'while') {
                let i = 0;
                while (i < max) {
                    html += `<span class="badge">while: ${i}</span>`;
                    i++;
                }
                html += `<span class="badge highlight">✅ while ejecutado ${max} veces</span>`;
            } else if (currentTab === 'break') {
                for (let i = 0; i < max; i++) {
                    if (i === 5) continue;  // se salta el 5
                    if (i === 8) break;      // sale en 8
                    html += `<span class="badge">iter: ${i}</span>`;
                }
                html += `<span class="badge highlight">⏹️ break en i=8 · continue saltó i=5</span>`;
            }
            output.innerHTML = html;
        }

        runBtn.addEventListener('click', renderLoop);
        // inicial
        setActiveTab('for');
        renderLoop();
    </script>
</body>
</html>
