<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 7 · String & Number Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;700;800&display=swap');
        :root {
            --bg: #0a0f1a;
            --surface: #14222e;
            --neon-pink: #ff44b0;
            --neon-blue: #00a6ff;
            --neon-green: #a6ff6f;
            --glow-pink: 0 0 15px #ff44b0aa;
            --glow-blue: 0 0 15px #00a6ffaa;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 60% 30%, #1a2632, #0b0f14);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.8rem;
        }
        .string-lab {
            background: var(--surface);
            border: 2px solid var(--neon-pink);
            box-shadow: var(--glow-pink), 0 20px 40px black;
            border-radius: 56px;
            padding: 2.5rem;
            max-width: 800px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #fff, var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px var(--neon-pink);
            margin-bottom: 2rem;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .card {
            background: #0f1e2a;
            border-radius: 36px;
            padding: 1.6rem;
            border: 1px solid var(--neon-blue);
            box-shadow: inset 0 0 15px #00000060;
        }
        .card h3 {
            color: var(--neon-blue);
            margin-bottom: 1.2rem;
            font-size: 1.4rem;
            text-shadow: 0 0 8px var(--neon-blue);
            display: flex;
            gap: 0.5rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }
        .input-field {
            background: #1e2e3c;
            border: 2px solid #3a5a6a;
            border-radius: 40px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-field:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }
        .result-box {
            background: #0e1a26;
            border-radius: 30px;
            padding: 1rem 1.5rem;
            margin-top: 1rem;
            border-left: 8px solid var(--neon-green);
            word-break: break-word;
            color: #d0f0ff;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn-neon:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }
    </style>
</head>
<body>
    <div class="string-lab">
        <h1>📊 STRING & NUMBER LAB</h1>
        <div class="two-columns">
            <!-- Columna izquierda: números -->
            <div class="card">
                <h3>🔢 Operaciones numéricas</h3>
                <div class="input-group">
                    <input type="number" id="numA" class="input-field" value="2.3" step="any" placeholder="Número A">
                    <input type="number" id="numB" class="input-field" value="3.7" step="any" placeholder="Número B">
                </div>
                <div class="result-box" id="numResults">
                    Suma: 6.0<br>
                    Multiplicación: 8.51<br>
                    Potencia: 8.51
                </div>
                <button id="calcNumbers" class="btn-neon">⟳ CALCULAR</button>
            </div>
            <!-- Columna derecha: cadenas -->
            <div class="card">
                <h3>🔤 Operaciones con texto</h3>
                <div class="input-group">
                    <input type="text" id="strInput" class="input-field" value="El mejor programador" placeholder="Escribe algo">
                </div>
                <div class="result-box" id="strResults">
                    Mayúsculas: EL MEJOR PROGRAMADOR<br>
                    Minúsculas: el mejor programador<br>
                    Longitud: 21
                </div>
                <button id="calcStrings" class="btn-neon">⟳ PROCESAR</button>
            </div>
        </div>
        <!-- Área de resultado global con toast moderno -->
        <div style="margin-top: 2rem; display: flex; justify-content: center;">
            <button id="globalToastBtn" class="btn-neon" style="border-color: var(--neon-pink); color: var(--neon-pink);">💬 MOSTRAR TOAST DE SUMA</button>
        </div>
    </div>

    <script>
        'use strict';
        // ---------- NÚMEROS ----------
        const numA = document.getElementById('numA');
        const numB = document.getElementById('numB');
        const numResults = document.getElementById('numResults');

        function updateNumbers() {
            const a = parseFloat(numA.value) || 0;
            const b = parseFloat(numB.value) || 0;
            const suma = a + b;
            const mult = a * b;
            const pot = Math.pow(a, b).toFixed(4);
            numResults.innerHTML = `
                ➕ Suma: <strong style="color:var(--neon-green);">${suma.toFixed(2)}</strong><br>
                ✖️ Multiplicación: <strong style="color:var(--neon-green);">${mult.toFixed(2)}</strong><br>
                📈 Potencia (a^b): <strong style="color:var(--neon-green);">${pot}</strong>
            `;
        }

        document.getElementById('calcNumbers').addEventListener('click', updateNumbers);

        // ---------- CADENAS ----------
        const strInput = document.getElementById('strInput');
        const strResults = document.getElementById('strResults');

        function updateStrings() {
            let s = strInput.value || '';
            if (s === '') s = '(vacío)';
            const upper = s.toUpperCase();
            const lower = s.toLowerCase();
            const len = s.length;
            strResults.innerHTML = `
                🔠 Mayúsculas: <span style="color:var(--neon-blue);">${upper}</span><br>
                🔡 Minúsculas: <span style="color:var(--neon-blue);">${lower}</span><br>
                📏 Longitud: <span style="color:var(--neon-blue);">${len}</span> caracteres
            `;
        }

        document.getElementById('calcStrings').addEventListener('click', updateStrings);

        // ---------- TOAST DE SUMA (mejorado) ----------
        function showToast(message, color = '#ff44b0') {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed; bottom: 30px; right: 30px;
                background: ${color}; color: white; padding: 1rem 2.2rem;
                border-radius: 60px; font-weight: 700; box-shadow: 0 0 30px ${color};
                animation: toastFade 3s forwards; z-index: 9999;
                font-size: 1.1rem;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2800);
        }

        document.getElementById('globalToastBtn').addEventListener('click', () => {
            const a = parseFloat(numA.value) || 0;
            const b = parseFloat(numB.value) || 0;
            const suma = a + b;
            showToast(`✨ Resultado de la suma: ${suma.toFixed(2)}`, '#ff44b0');
        });

        // Inicializar
        updateNumbers();
        updateStrings();

        // Añadir estilo de animación toast
        const styleSheet = document.createElement("style");
        styleSheet.textContent = `
            @keyframes toastFade {
                0% { opacity: 0; transform: translateY(20px); }
                15% { opacity: 1; transform: translateY(0); }
                85% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(-20px); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
