<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 9 · Héroes Neon · Imagen real + reseña</title>
    <!-- Font Awesome 6 (gratuito) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;600;700;800;900&display=swap');
        :root {
            --bg: #0a0c16;
            --surface: #121c2a;
            --neon-gold: #ffd966;
            --neon-red: #ff4d6d;
            --neon-blue: #48cae4;
            --neon-purple: #c77dff;
            --glow-gold: 0 0 25px #ffd966aa, 0 0 50px #ffd96666;
            --glow-red: 0 0 25px #ff4d6daa;
            --glow-blue: 0 0 25px #48cae4aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background 0.5s ease;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(72,202,228,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .hero-cosmic {
            background: rgba(18, 28, 42, 0.75);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 2px solid var(--neon-gold);
            box-shadow: var(--glow-gold), 0 30px 60px #00000080;
            border-radius: 64px;
            padding: 2.8rem 2.8rem;
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 10;
            transition: border 0.3s, box-shadow 0.3s;
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-cosmic:hover {
            border-color: var(--neon-blue);
            box-shadow: var(--glow-blue), 0 40px 70px black;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(145deg, #fff, var(--neon-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px var(--neon-gold);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            letter-spacing: -0.02em;
        }
        h1 i { font-size: 2.8rem; color: var(--neon-gold); text-shadow: 0 0 20px var(--neon-gold); }
        .selector-wrapper {
            position: relative;
            margin-bottom: 3rem;
        }
        select {
            width: 100%;
            padding: 1.3rem 2.2rem;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 80px;
            background: #0f1e2c;
            border: 2px solid #3c6e8c;
            color: white;
            appearance: none;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28' viewBox='0 0 24 24' fill='%23ffd966'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 2rem center;
            background-size: 2rem;
        }
        select:hover, select:focus {
            border-color: var(--neon-gold);
            box-shadow: 0 0 30px var(--neon-gold);
        }
        /* Tarjeta de héroe (Glassmorphism + imagen) */
        .hero-profile {
            display: flex;
            flex-direction: row;
            gap: 2.5rem;
            align-items: center;
            background: rgba(10, 22, 36, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 2rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 2rem;
            transition: 0.3s;
        }
        .hero-avatar {
            flex-shrink: 0;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1e3a5a, #0e1e2e);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid var(--neon-gold);
            box-shadow: 0 0 40px var(--neon-gold);
            overflow: hidden; /* Para imágenes */
        }
        .hero-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .hero-avatar i {
            font-size: 5rem;
            color: white;
            text-shadow: 0 0 20px white;
        }
        .hero-info {
            flex: 1;
        }
        .hero-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 0.3rem;
        }
        .hero-category {
            display: inline-block;
            background: rgba(255, 200, 100, 0.2);
            border: 1px solid var(--neon-gold);
            border-radius: 60px;
            padding: 0.3rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--neon-gold);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* Nueva sección de reseña */
        .hero-bio {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--neon-blue);
            border-radius: 20px;
            padding: 0.8rem 1.5rem;
            margin: 1rem 0 1.5rem 0;
            color: #e0e0ff;
            font-size: 1.1rem;
            font-style: italic;
            text-shadow: 0 0 8px var(--neon-blue);
            box-shadow: 0 0 15px rgba(72, 202, 228, 0.3);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2rem;
        }
        .stat-card {
            background: #0e1c2a;
            border-radius: 40px;
            padding: 1.2rem 0.5rem;
            text-align: center;
            border-bottom: 6px solid var(--neon-red);
            box-shadow: inset 0 -2px 0 #00000050, 0 8px 0 #00000030;
            transition: 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-6px);
            border-bottom-color: var(--neon-gold);
            box-shadow: 0 0 25px var(--neon-gold);
        }
        .stat-label {
            color: #aad0ff;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 12px var(--neon-blue);
            line-height: 1.2;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #a0b0c0;
            font-size: 1.4rem;
        }
        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @media (max-width: 750px) {
            .hero-profile { flex-direction: column; text-align: center; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body id="heroBody">
    <div class="hero-cosmic">
        <h1><i class="fas fa-mask"></i> SELECTOR DE HÉROES</h1>
        <div class="selector-wrapper">
            <select id="heroSelector">
                <option value="">🌠 Elige un héroe</option>
            </select>
        </div>

        <!-- Contenedor dinámico: perfil del héroe + estadísticas + reseña -->
        <div id="heroProfileContainer">
            <div class="empty-state">
                <i class="fas fa-star" style="font-size:3rem; color:var(--neon-gold);"></i>
                <p style="margin-top:1rem;">Selecciona un héroe para ver sus estadísticas y avatar.</p>
            </div>
        </div>
    </div>

    <script>
        'use strict';
        // ---------- BASE DE DATOS DE HÉROES CON URL DE IMAGEN REAL Y RESEÑA ----------
        const heroes = [
            { 
                name: 'Superman', 
                category: 'Movies', 
                image: 'https://i.redd.it/2h7vnm2sy4k91.jpg', 
                stats: { Fuerza: 100, Velocidad: 90, Inteligencia: 85 },
                bio: 'El último hijo de Krypton, símbolo de esperanza y justicia. Su fuerza es casi ilimitada bajo el sol amarillo.'
            },
            { 
                name: 'Batman', 
                category: 'Movies', 
                image: 'https://www.slashfilm.com/img/gallery/the-15-best-batman-comics-you-need-to-read/intro-1660174737.jpg', 
                stats: { Fuerza: 85, Velocidad: 70, Inteligencia: 95 },
                bio: 'El Caballero Oscuro de Gotham. Sin poderes, pero con una mente brillante y una determinación inquebrantable.'
            },
            { 
                name: 'Nightwing', 
                category: 'Movies',

                bio: 'El primer Robin, ahora líder de los Jóvenes Titanes. Ágil, carismático y con un gran dominio del combate.'
            },
            { 
                name: 'Wonder Woman', 
                category: 'Movies', 
                image: 'https://wallpapers.com/images/hd/dc-comics-superhero-character-wonder-woman-gnyd8jd57uici63t.jpg', 
                stats: { Fuerza: 95, Velocidad: 80, Inteligencia: 80 },
                bio: 'Princesa de las Amazonas, guerrera entrenada y portadora de la verdad. Su látigo y brazaletes son legendarios.'
            },
            { 
                name: 'Wally West', 
                category: 'Movies', 
                image: 'https://i.ytimg.com/vi/HUIrGfh16Sc/hq720.jpg?sqp=-oaymwE7CK4FEIIDSFryq4qpAy0IARUAAAAAGAElAADIQj0AgKJD8AEB-AH-CYAC0AWKAgwIABABGH8gJihCMA8=&rs=AOn4CLAw4bl7TjmQu2SwoTrJ8iwT3xFRWQ', 
                stats: { Fuerza: 85, Velocidad: 100, Inteligencia: 80 },
                bio: 'El Flash más rápido, capaz de vibrar a través de la materia y viajar en el tiempo. Un héroe con gran corazón.'
            },
            { 
                name: 'Spider-Man', 
                category: 'Movies', 
                image: 'https://i.pinimg.com/736x/77/4c/55/774c5558b11c5dc4884429f7f5c7c6f7.jpg', 
                stats: { Fuerza: 75, Velocidad: 80, Inteligencia: 90 },
                bio: 'El vecino amigable, Peter Parker. Un genio científico lleno de responsabilidad y un sentido arácnido muy agudo.'
            },
            { 
                name: 'Iron Man', 
                category: 'Movies', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpEM5g4gVUDZvf6y9x0TDXbkRR1vNagGii3A&s', 
                stats: { Fuerza: 80, Velocidad: 70, Inteligencia: 100 },
                bio: 'Tony Stark, multimillonario genio inventor. Su armadura lo convierte en un héroe de alta tecnología.'
            },
            { 
                name: 'Thor', 
                category: 'Movies', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpPU4pCy47NBUBIQUmKqwGTVPhye20nCUUjA&s', 
                stats: { Fuerza: 100, Velocidad: 75, Inteligencia: 70 },
                bio: 'Dios del trueno, heredero de Asgard. Su martillo Mjolnir canaliza tormentas y lo hace casi invencible.'
            },
            { 
                name: 'Flash', 
                category: 'Movies', 
                image: 'https://wallpapers.com/images/hd/the-flash-movie-iconic-comic-book-character-gpvisint0t1sm4k6.jpg', 
                stats: { Fuerza: 70, Velocidad: 100, Inteligencia: 75 },
                bio: 'Barry Allen, el hombre más rápido vivo. Conectado a la Fuerza de la Velocidad, protege Central City.'
            },
            { 
                name: 'Aquaman', 
                category: 'Movies', 
                image: 'https://www.comicverso.com/wp-content/uploads/2026/01/All-in-Aquaman.jpg', 
                stats: { Fuerza: 90, Velocidad: 75, Inteligencia: 70 },
                bio: 'Rey de la Atlántida, capaz de comunicarse con la vida marina y manejar el tridente con poder oceánico.'
            },
            { 
                name: 'Naruto', 
                category: 'Anime', 
                image: 'https://i.blogs.es/0cafeb/naruto/840_560.jpeg', 
                stats: { Fuerza: 85, Velocidad: 85, Inteligencia: 80 },
                bio: 'El ninja más impredecible. Soñador y tenaz, busca ser Hokage mientras controla al zorro de nueve colas.'
            },
            { 
                name: 'Goku', 
                category: 'Anime', 
                image: 'https://fwmedia.fandomwire.com/wp-content/uploads/2025/08/04031222/goku-dragon-ball-1.jpg', 
                stats: { Fuerza: 100, Velocidad: 95, Inteligencia: 70 },
                bio: 'El guerrero Saiyan que siempre supera sus límites. Amante de la lucha y protector de la Tierra.'
            },
            { 
                name: 'Luffy', 
                category: 'Anime', 
                image: 'https://cdn.polyspeak.ai/speakmaster/ecc5d2f3edd10f75f6ea337d0500f9de.webp', 
                stats: { Fuerza: 90, Velocidad: 80, Inteligencia: 75 },
                bio: 'Capitán de los Piratas de Sombrero de Paja. Su cuerpo de goma y su voluntad férrea lo llevan a ser el Rey de los Piratas.'
            },
            { 
                name: 'Escanor', 
                category: 'Anime', 
                image: 'https://i.pinimg.com/736x/e0/fd/80/e0fd80b054139bb3be150938ab55e796.jpg', 
                stats: { Fuerza: 100, Velocidad: 60, Inteligencia: 70 },
                bio: 'La furia del León, miembro de los Siete Pecados Capitales. Su poder crece con el sol hasta volverse imparable.'
            },
            { 
                name: 'Saitama', 
                category: 'Anime', 
                image: 'https://f.rpp-noticias.io/2019/06/19/132313_803989.jpg?width=1020&quality=80', 
                stats: { Fuerza: 100, Velocidad: 100, Inteligencia: 60 },
                bio: 'El héroe más fuerte, capaz de vencer a cualquier enemigo de un solo puñetazo. Busca un oponente digno.'
            },
            { 
                name: 'Gojo Satoru', 
                category: 'Anime', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRONGQscz4iB_vn_oyqMgLyWvGXUSoe_nUp1Q&s', 
                stats: { Fuerza: 80, Velocidad: 85, Inteligencia: 100 },
                bio: 'El hechicero más poderoso de Jujutsu High. Su técnica Ilimitado y sus seis ojos lo hacen casi invencible.'
            },
            { 
                name: 'Eren Yeager', 
                category: 'Anime', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbxlKcjsVYrU_0jWlGzLNxZlSQLX3YV2PFdQ&s', 
                stats: { Fuerza: 85, Velocidad: 80, Inteligencia: 75 },
                bio: 'El Titán de Ataque. Su sed de libertad lo lleva a luchar contra el mundo entero por sus ideales.'
            },
            { 
                name: 'King Arthur', 
                category: 'Legends', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ0CFXAQpv33QorPUxFBKKqX1ZtMZoaOTe2sA&s', 
                stats: { Fuerza: 80, Velocidad: 65, Inteligencia: 85 },
                bio: 'El rey de Camelot, portador de Excalibur. Unificador de Britania y líder de los Caballeros de la Mesa Redonda.'
            },
            { 
                name: 'Hercules', 
                category: 'Legends', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnZlM5hZeT8oSnylb1C_azhKJ6bUYXizFRyA&s', 
                stats: { Fuerza: 75, Velocidad: 70, Inteligencia: 90 },
                bio: 'Héroe de la mitología griega, famoso por sus doce trabajos. Hijo de Zeus, símbolo de fuerza y valor.'
            },
            { 
                name: 'Achilles', 
                category: 'Legends', 
                image: 'https://www.greekmythology.com/images/mythology/achilles_large_image_218.jpg', 
                stats: { Fuerza: 90, Velocidad: 85, Inteligencia: 70 },
                bio: 'Guerrero invencible en la guerra de Troya, salvo por su talón. Representa la gloria y la furia en batalla.'
            },
            { 
                name: 'Perseus', 
                category: 'Legends', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS3QJupK2S3ZG9o8odECdy51ucBwpn4DoA4dA&s', 
                stats: { Fuerza: 80, Velocidad: 75, Inteligencia: 80 },
                bio: 'El héroe que decapitó a Medusa. Hijo de Zeus, astuto y favorecido por los dioses con armas divinas.'
            },
            { 
                name: 'Beowulf', 
                category: 'Legends', 
                image: 'https://cdn.theatlantic.com/thumbor/j1gAKjuVYeqsOCTo-bOtiEiKX4o=/0x11:2000x1136/960x540/media/img/2017/03/CULT_Omnivore_Beowulf_Web_RGB/original.jpg', 
                stats: { Fuerza: 95, Velocidad: 70, Inteligencia: 65 },
                bio: 'El héroe geat que derrotó a Grendel y a su madre. Su leyenda épica vive en el poema anglosajón.'
            },
            { 
                name: 'Mulan', 
                category: 'Legends', 
                image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8lelhju_f_GFcawQ_b7lIs0gNARJvngzAdg&s', 
                stats: { Fuerza: 70, Velocidad: 80, Inteligencia: 90 },
                bio: 'La guerrera que se disfrazó de hombre para salvar a su padre y a China. Astuta, hábil y honorable.'
            },
        ];

        // ---------- MAPA DE GRADIENTES PARA FONDO (por categoría) ----------
        const bgGradients = {
            Movies: 'radial-gradient(circle at 70% 20%, #1a2639, #0e121c)',
            Anime: 'radial-gradient(circle at 30% 60%, #2a1a3a, #0e0c14)',
            Legends: 'radial-gradient(circle at 80% 40%, #1e3a2a, #0c1410)'
        };

        const selector = document.getElementById('heroSelector');
        const container = document.getElementById('heroProfileContainer');
        const body = document.getElementById('heroBody');

        // Poblar select
        heroes.forEach(hero => {
            const option = document.createElement('option');
            option.value = hero.name;
            option.textContent = `${hero.name} (${hero.category})`;
            selector.appendChild(option);
        });

        // ---------- FUNCIÓN PARA RENDERIZAR PERFIL CON IMAGEN Y RESEÑA ----------
        function renderHero(heroName) {
            const hero = heroes.find(h => h.name === heroName);
            if (!hero) {
                container.innerHTML = `<div class="empty-state">
                    <i class="fas fa-star" style="font-size:3rem; color:var(--neon-gold);"></i>
                    <p style="margin-top:1rem;">Selecciona un héroe para ver sus estadísticas y avatar.</p>
                </div>`;
                body.style.background = '#0a0c16';
                return;
            }

            // Cambiar fondo según categoría
            body.style.background = bgGradients[hero.category] || '#0a0c16';

            // Generar HTML del perfil con imagen (si existe) y fallback a icono
            const { Fuerza, Velocidad, Inteligencia } = hero.stats;
            const avatarContent = hero.image 
                ? `<img src="${hero.image}" alt="${hero.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-user\\' style=\\'font-size:5rem; color:white;\\'></i>';">` 
                : `<i class="fas fa-user" style="font-size:5rem; color:white;"></i>`;

            const profileHTML = `
                <div class="hero-profile">
                    <div class="hero-avatar">
                        ${avatarContent}
                    </div>
                    <div class="hero-info">
                        <div class="hero-name">${hero.name}</div>
                        <span class="hero-category"><i class="fas fa-tag"></i> ${hero.category}</span>
                        <div class="hero-bio">${hero.bio || 'No hay reseña disponible para este héroe.'}</div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-dumbbell"></i> Fuerza</div>
                                <div class="stat-value">${Fuerza}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-bolt"></i> Velocidad</div>
                                <div class="stat-value">${Velocidad}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-brain"></i> Inteligencia</div>
                                <div class="stat-value">${Inteligencia}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = profileHTML;
        }

        // Evento change
        selector.addEventListener('change', (e) => renderHero(e.target.value));
    </script>
</body>
</html>
